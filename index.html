<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BatMarcos — Tabuada de Gotham | Prof. Marcos</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif}
#gw{background:#03030a;border-radius:12px;overflow:hidden;position:relative;width:680px;user-select:none}
#hud{display:flex;justify-content:space-between;align-items:center;padding:6px 14px;background:rgba(0,0,0,0.9);border-bottom:1px solid #1a1a40;z-index:3;position:relative}
.sbox{font-size:11px;color:#88aaff;font-weight:700}
.lbox{font-size:11px;color:#ff5555;font-weight:700}
.lvlbox{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;border:1px solid #00ff8833;color:#aaffaa;background:rgba(0,200,100,0.12)}
#fsBtn{background:rgba(255,230,0,0.1);border:1px solid #ffe60033;color:#ffe600;border-radius:5px;padding:4px 10px;font-size:11px;font-weight:800;cursor:pointer;transition:background 0.15s}
#fsBtn:hover{background:rgba(255,230,0,0.25)}
canvas{display:block;width:100%}
#overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.92);color:#fff;flex-direction:column;align-items:center;justify-content:center;gap:11px;z-index:10;text-align:center;padding:20px;border-radius:12px}
#overlay.on{display:flex}
#overlay h2{font-size:24px;font-weight:900;letter-spacing:3px;line-height:1.2}
#overlay p{font-size:12px;color:#bbb;max-width:320px;line-height:1.7}
#overlay .btn{padding:10px 32px;border:none;border-radius:8px;font-size:14px;font-weight:900;cursor:pointer;letter-spacing:2px;transition:background 0.15s}
#regform{display:flex;flex-direction:column;gap:8px;width:100%;max-width:300px}
#regform input,#regform select{padding:8px 12px;border-radius:6px;border:1px solid #333;background:#111;color:#fff;font-size:13px;outline:none}
#regform input:focus,#regform select:focus{border-color:#ffe600}
#instr{position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:9px;color:#1a1a40;pointer-events:none;z-index:2}
</style>
</head>
<body>
<div id="gw">
  <div id="hud">
    <div class="lbox" id="ld">♥ ♥ ♥</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:1px">
      <div style="font-size:9px;color:#ffe60077;font-weight:700;letter-spacing:2px">PROF. MARCOS</div>
      <div style="font-size:13px;font-weight:900;color:#ffe600" id="optype">× TABUADA</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="lvlbox" id="lvld">NV 1</div>
      <div class="sbox" id="sd">0 pts</div>
      <button id="fsBtn">⛶ FULL</button>
    </div>
  </div>
  <canvas id="gc"></canvas>
  <div id="instr">← → mover &nbsp;|&nbsp; ↑ / Espaço pular &nbsp;|&nbsp; toque: esq / dir / centro = pulo</div>
  <div id="overlay" class="on">
    <h2 style="color:#ffe600">🦇 BATMARCOS</h2>
    <p style="color:#ffe60099;font-size:10px;letter-spacing:2px;margin-bottom:4px">— PROF. MARCOS —</p>
    <p>Preencha seus dados para começar:</p>
    <div id="regform">
      <input id="f-nome" placeholder="Seu nome completo" maxlength="60"/>
      <input id="f-email" placeholder="Seu e-mail" type="email" maxlength="80"/>
      <select id="f-serie">
        <option value="">Série / Ano</option>
        <option>6º Ano</option><option>7º Ano</option><option>8º Ano</option><option>9º Ano</option>
        <option>1º EM</option><option>2º EM</option><option>3º EM</option>
      </select>
      <select id="f-turma">
        <option value="">Turma</option>
        <option>A</option><option>B</option><option>C</option><option>D</option><option>E</option><option>F</option>
      </select>
    </div>
    <button class="btn" id="sb" onclick="validateAndStart()" style="background:#ffe600;color:#000">INICIAR MISSÃO</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   BATMARCOS — TABUADA DE GOTHAM
   Prof. Marcos — Colégio Helena Nasser — Anápolis-GO
   Configure APPS_URL com sua URL do Google Apps Script
   ══════════════════════════════════════════════ */
// SUBSTITUA pela URL gerada em: script.google.com → Implantar → App da Web
const APPS_URL = 'https://script.google.com/macros/s/AKfycbzK-wBG1lkEom9N2VePZq0GU3-x1vPe6zV87PiIcKr8KBIyRbfk3p2FznrJB-mvn1wx/exec';

const CV=document.getElementById('gc');
const X=CV.getContext('2d');
const W=680,H=360;
CV.width=W;CV.height=H;CV.style.width='100%';

document.getElementById('fsBtn').onclick=()=>{
  const el=document.getElementById('gw');
  document.fullscreenElement?document.exitFullscreen():el.requestFullscreen&&el.requestFullscreen();
};
document.addEventListener('fullscreenchange',()=>{
  document.getElementById('fsBtn').textContent=document.fullscreenElement?'✕ SAIR':'⛶ FULL';
});

const GND=H-58;
const GRAV=0.56,JF=-13.8,SPD=4.0,CAPE_SEGS=16;

const OBS_COLORS=[
  '#c8d8e8','#dde8f0','#e8e4c8','#f0e890','#f5d06a',
  '#f0a8a8','#e86868','#f08080','#b8c8d8','#d8c8a8'
];

let playerData={nome:'',email:'',serie:'',turma:''};
let score=0,bestScore=0,lives=3,level=1,running=false,raf,fN=0;
let q={},obs=[],parts=[],floats=[];
let bx=90,by=GND-74,bvx=0,bvy=0,onG=false,face=1,jpd=false;
let prevVX=0,capeP=[],bgOff=0,rainDrops=[];
let levelSpacing=380;
let showPlatform=false,platformX=W+200,platformArrived=false;
let gameCount=0;
const keys={};

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if([' ','ArrowUp','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
});
document.addEventListener('keyup',e=>keys[e.key]=false);
CV.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=CV.getBoundingClientRect();
  [...e.touches].forEach(t=>{
    const tx=(t.clientX-r.left)*(W/r.width);
    if(tx<W/3){keys['ArrowLeft']=true;setTimeout(()=>keys['ArrowLeft']=false,280);}
    else if(tx>W*2/3){keys['ArrowRight']=true;setTimeout(()=>keys['ArrowRight']=false,280);}
    else{keys[' ']=true;setTimeout(()=>keys[' ']=false,110);}
  });
},{passive:false});

function initRain(){
  rainDrops=[];
  for(let i=0;i<90;i++)
    rainDrops.push({x:Math.random()*W,y:Math.random()*GND,len:7+Math.random()*11,spd:5+Math.random()*5});
}

function pickObsColors(n){
  const pool=[...OBS_COLORS].sort(()=>Math.random()-0.5);
  const result=[];
  for(let i=0;i<n;i++)result.push(pool[i%pool.length]);
  return result;
}

function genQ(forceType){
  const ta=[2,3,4,5,6,7,8,9];
  const a=ta[Math.floor(Math.random()*ta.length)];
  const b=Math.floor(Math.random()*9)+1;
  let opType=forceType||(level===1?'×':(Math.random()<0.5?'×':(Math.random()<0.5?'+':'-')));
  let c,label;
  if(opType==='×'){c=a*b;label=`${a} × ${b}`;}
  else if(opType==='+'){const x=Math.floor(Math.random()*50)+1,y=Math.floor(Math.random()*50)+1;c=x+y;label=`${x} + ${y}`;}
  else{const x=Math.floor(Math.random()*80)+20,y=Math.floor(Math.random()*x);c=x-y;label=`${x} − ${y}`;}
  const wr=new Set();
  while(wr.size<2){let w=c+(Math.floor(Math.random()*16)-8);if(w>=0&&w!==c)wr.add(w);}
  q={a,b,c,label,opType,opts:[c,...wr].sort(()=>Math.random()-0.5)};
  document.getElementById('optype').textContent=opType==='×'?'× TABUADA':opType==='+'?'+ ADIÇÃO':'− SUBTRAÇÃO';
  spawnObs();
}

const OBS_SHAPES_MUL=['stone','tower','arch','rocket','gargoyle'];
const OBS_SHAPES_LOW=['trash','boomerang','crate','barrel'];

function spawnObs(){
  obs=[];
  const isMul=q.opType==='×';
  const colors=pickObsColors(q.opts.length);
  const shuffledOpts=[...q.opts].sort(()=>Math.random()-0.5);
  const shuffledColors=[...colors].sort(()=>Math.random()-0.5);
  shuffledOpts.forEach((v,i)=>{
    const tall=isMul?(55+Math.floor(Math.random()*35)):(22+Math.floor(Math.random()*18));
    const w=isMul?(68+Math.floor(Math.random()*18)):(52+Math.floor(Math.random()*14));
    const shapePool=isMul?OBS_SHAPES_MUL:OBS_SHAPES_LOW;
    const shape=shapePool[Math.floor(Math.random()*shapePool.length)];
    obs.push({x:W+60+i*levelSpacing,y:GND-tall,w,h:tall,val:v,correct:v===q.c,
      hit:false,pt:i*0.9,crumble:0,shape,color:shuffledColors[i]});
  });
}

function levelUp(){
  if(level===1){
    level=2;showPlatform=true;platformX=W+150;platformArrived=false;obs=[];
    updateLvlHUD();
    spawnParts(bx+22,by,'#ff6600',14);
    spawnFloat('NÍVEL 2!',bx+22,by-20,'#ff8844');
  } else {
    level++;levelSpacing=Math.max(130,380-level*28);
    updateLvlHUD();
    spawnParts(bx+22,by,'#ff6600',10);
    spawnFloat('NV '+level+'!',bx+22,by-20,'#ffaa44');
  }
}

function updateLvlHUD(){
  const lv=document.getElementById('lvld');
  lv.textContent=`NV ${level}`;
  if(level>1){lv.style.color='#ffaa44';lv.style.borderColor='#ff660033';lv.style.background='rgba(255,100,0,0.12)';}
  else{lv.style.color='#aaffaa';lv.style.borderColor='#00ff8833';lv.style.background='rgba(0,200,100,0.12)';}
}

function spawnParts(x,y,col,n=14){
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i+Math.random()*0.5,sp=2+Math.random()*4.5;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,col,s:2.5+Math.random()*4});
  }
}
function spawnFloat(t,x,y,col){floats.push({t,x,y,vy:-1.6,life:1.8,col});}
function updateHUD(){
  document.getElementById('sd').textContent=`${score} pts`;
  document.getElementById('ld').textContent='♥ '.repeat(Math.max(0,lives)).trim();
}

/* ══ SINAL M ══ */
function drawMSignal(){
  const t2=Date.now()*0.001;
  const l2=level>1;
  const bldX=310,bldTop=GND-200;
  const bA=0.14+Math.sin(t2*0.5)*0.04;
  const bc=l2?'rgba(255,140,60,':'rgba(255,240,120,';
  X.save();
  const bg2=X.createLinearGradient(bldX+45,0,bldX+45,bldTop);
  bg2.addColorStop(0,bc+'0)');bg2.addColorStop(0.5,bc+(bA*0.6)+')');bg2.addColorStop(1,bc+bA+')');
  X.fillStyle=bg2;
  X.beginPath();X.moveTo(bldX+10,bldTop);X.lineTo(bldX+80,bldTop);X.lineTo(bldX+200,0);X.lineTo(bldX-100,0);X.closePath();X.fill();
  const sg=X.createRadialGradient(bldX+45,0,0,bldX+45,0,220);
  sg.addColorStop(0,bc+(bA*3)+')');sg.addColorStop(0.4,bc+(bA*0.9)+')');sg.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=sg;X.fillRect(bldX-180,0,450,130);
  X.restore();
  const mx=bldX+45,my=52;
  X.save();X.globalAlpha=0.92;
  const cg2=X.createRadialGradient(mx,my,0,mx,my,68);
  cg2.addColorStop(0,l2?'rgba(40,15,0,0.75)':'rgba(20,18,0,0.75)');
  cg2.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=cg2;X.beginPath();X.arc(mx,my,68,0,Math.PI*2);X.fill();
  X.strokeStyle=l2?'rgba(255,140,60,0.7)':'rgba(255,240,120,0.7)';X.lineWidth=2;
  X.beginPath();X.arc(mx,my,62,0,Math.PI*2);X.stroke();
  X.strokeStyle=l2?'rgba(255,140,60,0.25)':'rgba(255,240,120,0.25)';X.lineWidth=1;
  X.beginPath();X.arc(mx,my,68+Math.sin(t2*1.2)*4,0,Math.PI*2);X.stroke();
  X.fillStyle=l2?'rgba(255,140,60,0.25)':'rgba(255,240,100,0.25)';
  X.font='bold 68px "Arial Black",sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText('M',mx,my+8);
  X.fillStyle=l2?'#ffaa44':'#ffe680';
  X.font='bold 28px "Arial Black","Segoe UI",sans-serif';X.textAlign='center';X.textBaseline='middle';
  X.fillText(q.label||'...',mx,my-4);
  X.strokeStyle=l2?'rgba(255,140,60,0.4)':'rgba(255,240,100,0.4)';X.lineWidth=1;
  X.beginPath();X.moveTo(mx-40,my+18);X.lineTo(mx+40,my+18);X.stroke();
  X.fillStyle=l2?'rgba(255,140,60,0.8)':'rgba(255,240,100,0.8)';
  X.font='bold 15px "Segoe UI",sans-serif';X.fillText('= ?',mx,my+30);
  X.restore();
  X.save();
  X.fillStyle=l2?'#ff8844':'#ffe680';X.beginPath();X.arc(bldX+45,bldTop-2,5,0,Math.PI*2);X.fill();
  X.fillStyle=l2?'rgba(255,136,68,0.4)':'rgba(255,230,128,0.4)';X.beginPath();X.arc(bldX+45,bldTop-2,12,0,Math.PI*2);X.fill();
  X.restore();
}

function drawRain(){
  X.strokeStyle=level>1?'rgba(255,100,50,0.14)':'rgba(130,150,255,0.17)';X.lineWidth=0.7;
  rainDrops.forEach(d=>{
    d.x+=0.3;d.y+=d.spd;if(d.y>GND){d.y=-8;d.x=Math.random()*W;}
    X.beginPath();X.moveTo(d.x,d.y);X.lineTo(d.x+2,d.y+d.len);X.stroke();
  });
}

const BLDS=[{rx:0,w:55,h:130,win:3},{rx:60,w:38,h:90,win:2},{rx:105,w:70,h:185,win:4,tower:true},
  {rx:185,w:44,h:110,win:2},{rx:240,w:28,h:75,win:2},{rx:275,w:90,h:200,win:5,center:true},
  {rx:375,w:50,h:140,win:3},{rx:435,w:35,h:95,win:2},{rx:478,w:65,h:160,win:4},
  {rx:555,w:42,h:115,win:3},{rx:608,w:55,h:135,win:3},{rx:668,w:40,h:88,win:2}];

function drawBuildings(){
  const l2=level>1;
  BLDS.forEach(b=>{
    const ox=((b.rx-bgOff*0.45)%W+W*2)%W;
    X.fillStyle=l2?'#120500':'#080816';X.fillRect(ox,GND-b.h,b.w,b.h);
    if(b.center){
      for(let s=0;s<3;s++){X.fillStyle=l2?'#0e0300':'#0a0a1c';X.fillRect(ox+(b.w-(b.w-s*14))/2,GND-b.h-14*s,b.w-s*14,14);}
      X.fillStyle=l2?'#1a0800':'#111128';X.fillRect(ox+b.w/2-4,GND-b.h-30,8,32);
      X.fillStyle=l2?'rgba(255,100,0,0.7)':'rgba(255,230,0,0.5)';X.beginPath();X.arc(ox+b.w/2,GND-b.h-32,4,0,Math.PI*2);X.fill();
    }
    if(b.tower){
      X.fillStyle=l2?'#150400':'#0d0d1e';X.fillRect(ox+b.w/2-4,GND-b.h-16,8,18);
      X.fillStyle=l2?'#ff4400':'#3355ff';X.beginPath();X.arc(ox+b.w/2,GND-b.h-18,2.5,0,Math.PI*2);X.fill();
    }
    for(let row=0;row<Math.floor(b.h/18);row++){
      for(let col=0;col<b.win;col++){
        const wx=ox+4+col*((b.w-8)/Math.max(1,b.win)),wy=GND-b.h+6+row*18;
        const lit=Math.sin(fN*0.007+wx*0.09+wy*0.04)>0.25;
        X.fillStyle=lit?(l2?'#ff660018':'#ffe68025'):'#09091a';
        X.fillRect(wx,wy,Math.max(4,(b.w-8)/b.win-3),8);
      }
    }
    X.strokeStyle='rgba(20,20,50,0.7)';X.lineWidth=0.5;X.strokeRect(ox,GND-b.h,b.w,b.h);
  });
}

function drawGround(){
  X.fillStyle=level>1?'#180800':'#0a0a20';X.fillRect(0,GND,W,H-GND);
  X.fillStyle=level>1?'rgba(255,80,0,0.1)':'rgba(70,90,255,0.08)';X.fillRect(0,GND,W,3);
  for(let i=0;i<W+50;i+=48){
    const lx=((i-bgOff*1.2)%W+W)%W;
    X.strokeStyle=level>1?'rgba(140,50,0,0.13)':'rgba(50,60,140,0.13)';X.lineWidth=1;
    X.beginPath();X.moveTo(lx,GND+10);X.lineTo(lx+24,GND+10);X.stroke();
  }
}
function drawMoon(){
  const l2=level>1;
  X.fillStyle=l2?'#cc4400':'#a89e72';X.beginPath();X.arc(75,38,26,0,Math.PI*2);X.fill();
  X.fillStyle=l2?'#aa3300':'#887e5a';
  [[83,30,5],[70,44,3.5],[80,46,2.5]].forEach(([mx,my,mr])=>{X.beginPath();X.arc(mx,my,mr,0,Math.PI*2);X.fill();});
}

/* ══ PLATAFORMA ══ */
function drawPlatform(){
  if(!showPlatform)return;
  const py=GND-90;
  platformX-=1.8;
  X.fillStyle=level>1?'#2a1000':'#1a1a2e';X.fillRect(platformX,py,160,18);
  X.fillStyle=level>1?'rgba(255,100,0,0.3)':'rgba(100,150,255,0.3)';X.fillRect(platformX,py,160,3);
  X.strokeStyle=level>1?'#ff6600':'#4488ff';X.lineWidth=1;X.strokeRect(platformX,py,160,18);
  X.fillStyle=level>1?'#ff8844':'#88aaff';
  X.font='bold 10px "Segoe UI",sans-serif';X.textAlign='center';X.textBaseline='middle';
  X.fillText('▲ NÍVEL 2',platformX+80,py+9);
  if(bx+44>platformX&&bx<platformX+160&&by+74>=py&&by+74<=py+26&&bvy>=0){
    by=py-74;bvy=0;onG=true;
    if(!platformArrived){platformArrived=true;setTimeout(()=>{showPlatform=false;genQ();},1200);}
  }
  if(platformX+160<0)showPlatform=false;
}

/* ══ OBSTÁCULOS ══ */
function rrect(ctx,x,y,w,h,r){
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
}
function hexAlpha(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function isDark(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (r*0.299+g*0.587+b*0.114)<140;
}

function drawObs(){
  obs.forEach(o=>{
    if(o.hit&&o.crumble>=1)return;
    o.pt+=0.035;
    const floatY=o.shape==='boomerang'?Math.sin(o.pt*1.4)*6:Math.sin(o.pt)*3;
    const ox=o.x,oy=o.y+floatY;
    if(o.hit){o.crumble+=0.05;X.globalAlpha=Math.max(0,1-o.crumble);}
    X.shadowColor=o.color;X.shadowBlur=12;
    if(o.shape==='trash')drawTrash(ox,oy,o.w,o.h,o.color);
    else if(o.shape==='boomerang')drawBoomerang(ox,oy,o.w,o.h,o.color,o.pt);
    else if(o.shape==='tower')drawTower(ox,oy,o.w,o.h,o.color);
    else if(o.shape==='arch')drawArch(ox,oy,o.w,o.h,o.color);
    else if(o.shape==='barrel')drawBarrel(ox,oy,o.w,o.h,o.color);
    else if(o.shape==='crate')drawCrate(ox,oy,o.w,o.h,o.color);
    else if(o.shape==='rocket')drawRocket(ox,oy,o.w,o.h,o.color);
    else drawGargoyleObs(ox,oy,o.w,o.h,o.color);
    X.shadowBlur=0;
    const textCol=isDark(o.color)?'#ffffff':'#111111';
    X.lineWidth=3;X.strokeStyle=isDark(o.color)?'rgba(0,0,0,0.4)':'rgba(255,255,255,0.4)';
    X.font='bold 19px "Segoe UI",sans-serif';X.textAlign='center';X.textBaseline='middle';
    X.strokeText(o.val,ox+o.w/2,oy+o.h/2+1);
    X.fillStyle=textCol;X.fillText(o.val,ox+o.w/2,oy+o.h/2+1);
    X.globalAlpha=1;
  });
}

function drawTrash(x,y,w,h,col){
  const body=h*0.75;

/* ══ CAPA FÍSICA ══ */
function initCape(){
  capeP=[];
  for(let i=0;i<=CAPE_SEGS;i++)capeP.push({x:bx+22,y:by+12+i*(56/CAPE_SEGS),vx:0,vy:0});
}
function updateCape(){
  const windX=-(bvx*0.7+0.9),ax=bvx-prevVX;prevVX=bvx;
  capeP[0].x=bx+(face>0?8:38);capeP[0].y=by+12;capeP[0].vx=0;capeP[0].vy=0;
  const segL=56/CAPE_SEGS;
  for(let i=1;i<=CAPE_SEGS;i++){
    const p=capeP[i],pv=capeP[i-1];
    p.vx+=(windX*(0.4+i/CAPE_SEGS*0.9)-ax*0.4*(i/CAPE_SEGS))*0.14;
    p.vy+=0.28;p.vx*=0.80;p.vy*=0.80;p.x+=p.vx;p.y+=p.vy;
    const dx=p.x-pv.x,dy=p.y-pv.y,dist=Math.sqrt(dx*dx+dy*dy)||1,diff=(dist-segL)/dist;
    p.x-=dx*diff*0.5;p.y-=dy*diff*0.5;
    if(p.y>GND-1)p.y=GND-1;
    if(!onG&&i>CAPE_SEGS*0.6)p.y=Math.min(p.y,by+66);
  }
}
function drawCape(){
  if(capeP.length<2)return;
  const base=capeP[0];
  X.save();
  X.beginPath();X.moveTo(base.x,base.y);
  for(let i=1;i<=CAPE_SEGS;i++){
    const p=capeP[i];
    if(i===1)X.lineTo(p.x,p.y);
    else{const pv=capeP[i-1];X.quadraticCurveTo(pv.x,pv.y,(pv.x+p.x)/2,(pv.y+p.y)/2);}
  }
  X.lineTo(bx+(face>0?40:6),base.y+2);X.closePath();
  const cg=X.createLinearGradient(base.x,base.y,capeP[CAPE_SEGS].x,capeP[CAPE_SEGS].y);
  cg.addColorStop(0,'#20203a');cg.addColorStop(0.4,'#14142e');cg.addColorStop(1,'#08080f');
  X.fillStyle=cg;X.fill();
  X.strokeStyle='rgba(100,100,180,0.25)';X.lineWidth=0.5;X.stroke();
  X.restore();
}

function updateBatmarcos(){
  if(keys['ArrowLeft']||keys['a']){bvx=-SPD;face=-1;}
  else if(keys['ArrowRight']||keys['d']){bvx=SPD;face=1;}
  else bvx*=0.72;
  const jp=keys['ArrowUp']||keys[' ']||keys['w'];
  if(jp&&onG&&!jpd){bvy=JF;onG=false;jpd=true;}
  if(!jp)jpd=false;
  bvy+=GRAV;bx+=bvx;by+=bvy;
  if(bx<0)bx=0;if(bx+44>W)bx=W-44;
  if(by+74>=GND){by=GND-74;bvy=0;onG=true;}
}

function updateObs(){
  const spd=1.8+level*0.22;
  obs.forEach(o=>{if(!o.hit)o.x-=spd;});
  obs=obs.filter(o=>o.x>-130||(o.hit&&o.crumble<1));
  if(!showPlatform&&obs.filter(o=>!o.hit).length===0&&obs.filter(o=>o.hit&&o.crumble<1).length===0){
    if(level===1&&score>=60&&!platformArrived&&!showPlatform)levelUp();
    else genQ();
  }
  checkCol();
}

function checkCol(){
  obs.forEach(o=>{
    if(o.hit)return;
    const floatY=o.shape==='boomerang'?Math.sin(o.pt*1.4)*6:Math.sin(o.pt)*3;
    const oy=o.y+floatY;
    if(bx+44>o.x&&bx<o.x+o.w&&by<oy+o.h&&by+74>oy){
      o.hit=true;
      if(o.correct){
        const pts=10+level*3;score+=pts;
        if(score>bestScore)bestScore=score;
        spawnParts(o.x+o.w/2,oy,o.color,18);
        spawnFloat('+'+pts,o.x+o.w/2,oy-10,'#ffe680');
        updateHUD();
        if(level>1&&Math.floor(score/80)+1>level)levelUp();
        setTimeout(genQ,550);
      } else {
        lives--;updateHUD();
        spawnParts(o.x+o.w/2,oy,'#ff4444',12);
        spawnFloat('ERROU!',o.x+o.w/2,oy-10,'#ff6666');
        bvy=JF*0.35;
        if(lives<=0)setTimeout(gameOver,700);
      }
    }
  });
}

function updateParts(){
  parts=parts.filter(p=>p.life>0);
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.16;p.life-=0.028;p.s*=0.96;});
  floats=floats.filter(f=>f.life>0);
  floats.forEach(f=>{f.y+=f.vy;f.life-=0.022;});
}
function drawParts(){
  parts.forEach(p=>{X.globalAlpha=p.life;X.fillStyle=p.col;X.beginPath();X.arc(p.x,p.y,p.s,0,Math.PI*2);X.fill();});
  floats.forEach(f=>{X.globalAlpha=Math.min(1,f.life);X.fillStyle=f.col;X.font='bold 17px "Segoe UI",sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText(f.t,f.x,f.y);});
  X.globalAlpha=1;
}

function sendScore(){
  if(!APPS_URL||APPS_URL.includes('COLE_SUA_URL_AQUI')||APPS_URL.includes('YOUR_APPS_SCRIPT'))return;
  const payload={
    nome:playerData.nome,email:playerData.email,
    serie:playerData.serie,turma:playerData.turma,
    pontuacao:score,melhorPontuacao:bestScore,
    nivel:level,timestamp:new Date().toISOString()
  };
  fetch(APPS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)}).catch(()=>{});
}

function loop(){
  fN++;bgOff=(bgOff+0.5)%W;
  X.clearRect(0,0,W,H);
  const l2=level>1;
  const bg=X.createLinearGradient(0,0,0,GND);
  bg.addColorStop(0,l2?'#0a0200':'#02020a');bg.addColorStop(0.6,l2?'#180800':'#060612');bg.addColorStop(1,l2?'#220a00':'#0c0920');
  X.fillStyle=bg;X.fillRect(0,0,W,GND);
  drawMoon();drawMSignal();drawRain();drawBuildings();drawGround();
  if(showPlatform)drawPlatform();
  updateObs();drawObs();
  updateBatmarcos();drawBatmarcos();
  updateParts();drawParts();
  raf=requestAnimationFrame(loop);
}

function validateAndStart(){
  const nome=document.getElementById('f-nome').value.trim();
  const email=document.getElementById('f-email').value.trim();
  const serie=document.getElementById('f-serie').value;
  const turma=document.getElementById('f-turma').value;
  if(!nome||!email||!serie||!turma){alert('Por favor, preencha todos os campos!');return;}
  playerData={nome,email,serie,turma};
  startGame();
}

function startGame(){
  score=0;lives=3;level=1;levelSpacing=380;fN=0;
  bx=90;by=GND-74;bvx=0;bvy=0;onG=true;jpd=false;face=1;prevVX=0;
  parts=[];floats=[];obs=[];showPlatform=false;platformArrived=false;running=true;
  updateHUD();updateLvlHUD();
  document.getElementById('optype').textContent='× TABUADA';
  document.getElementById('optype').style.color='#ffe600';
  initCape();initRain();genQ();
  document.getElementById('overlay').classList.remove('on');
  cancelAnimationFrame(raf);loop();
}

function restartGame(){
  score=0;lives=3;level=1;levelSpacing=380;fN=0;
  bx=90;by=GND-74;bvx=0;bvy=0;onG=true;jpd=false;face=1;prevVX=0;
  parts=[];floats=[];obs=[];showPlatform=false;platformArrived=false;running=true;
  updateHUD();updateLvlHUD();
  document.getElementById('optype').textContent='× TABUADA';
  document.getElementById('optype').style.color='#ffe600';
  initCape();initRain();genQ();
  document.getElementById('overlay').classList.remove('on');
  cancelAnimationFrame(raf);loop();
}

// delegação de clique para capturar botões reinseridos via innerHTML
document.getElementById('overlay').addEventListener('click', function(e){
  if(e.target && e.target.id==='sb'){
    const ov = document.getElementById('overlay');
    // detecta qual estado estamos
    if(ov.querySelector('#f-nome') !== null){
      validateAndStart();
    } else if(gameCount >= 2){
      showFinalResult();
    } else if(gameCount > 0){
      restartGame();
    } else {
      validateAndStart();
    }
  }
});
</script>
